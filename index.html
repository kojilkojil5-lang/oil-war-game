<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블랙 골드: 호르무즈의 지배자 (멀티플레이어 데모)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #121214; color: #e4e4e7; font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { background-color: #1a1a1e; border: 1px solid #2d2d34; padding: 20px; border-radius: 12px; text-align: center; }
        .price-text { font-size: 3rem; font-weight: bold; color: #ef4444; margin: 10px 0; }
        .btn { padding: 12px 24px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; margin: 5px; }
        .btn-us { background-color: #2563eb; color: white; }
        .btn-us:hover { background-color: #1d4ed8; }
        .btn-iran { background-color: #16a34a; color: white; }
        .btn-iran:hover { background-color: #15803d; }
        .btn-bet { background-color: #f59e0b; color: #121214; }
        .btn-bet:hover { background-color: #d97706; }
        #news-box { height: 120px; overflow-y: auto; background-color: #0f0f11; padding: 10px; border-radius: 8px; text-align: left; font-size: 0.9rem; border: 1px solid #2d2d34; }
        .news-item { margin-bottom: 6px; border-bottom: 1px solid #1f1f23; padding-bottom: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦅 BLACK GOLD : HORMUZ WAR</h1>
        
        <div class="dashboard">
            <!-- 실시간 오일 가격판 -->
            <div class="panel">
                <h3>실시간 국제유가 (WTI)</h3>
                <div class="price-text">$<span id="oil-price">80.00</span></div>
                <p>지정학 긴장 지수: <span id="tension-meter" style="color:#f59e0b; font-weight:bold;">0</span>%</p>
            </div>
            
            <!-- 플레이어 금융 정보 -->
            <div class="panel">
                <h3>내 헤지펀드 계좌</h3>
                <div class="price-text" style="color: #60a5fa;">$<span id="my-balance">10,000</span></div>
                <p>나의 베팅: <span id="my-bet-status" style="font-weight:bold; color:#fbbf24;">없음</span></p>
            </div>
        </div>

        <!-- 실시간 차트 영역 -->
        <div class="panel" style="margin-bottom: 20px;">
            <canvas id="priceChart" style="width: 100%; height: 250px;"></canvas>
        </div>

        <!-- 정치 개입 및 예측 마켓 컨트롤러 -->
        <div class="dashboard">
            <div class="panel">
                <h3>🌐 군사 및 외교 개입</h3>
                <button class="btn btn-us" onclick="influence('US')">미국: 관세 압박 실행</button>
                <button class="btn btn-iran" onclick="influence('IRAN')">이란: 해상 훈련 개시</button>
            </div>
            <div class="panel">
                <h3>🗳️ 유가 $100 돌파 예측 배틀</h3>
                <p style="font-size:0.85rem; color:#a1a1aa;">현재 풀 지분율: YES (<span id="pool-yes">1</span>) vs NO (<span id="pool-no">1</span>)</p>
                <button class="btn btn-bet" onclick="placeBet('YES')">돌파한다 (YES) 베팅</button>
                <button class="btn btn-bet" style="background-color:#6b7280; color:white;" onclick="placeBet('NO')">유지된다 (NO) 베팅</button>
            </div>
        </div>

        <!-- 뉴스 피드 -->
        <div class="panel">
            <h3>🔴 실시간 정세 타임라인</h3>
            <div id="news-box"></div>
        </div>
    </div>

    <script>
        const socket = io();
        
        // --- 실시간 차트 초기화 세팅 ---
        const ctx = document.getElementById('priceChart').getContext('2d');
        const priceData = [];
        const labelData = [];
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labelData,
                datasets: [{
                    label: 'WTI Oil Price ($)',
                    data: priceData,
                    borderColor: '#ef4444',
                    backgroundColor: 'rgba(239, 68, 68, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: { grid: { color: '#2d2d34' } },
                    y: { grid: { color: '#2d2d34' } }
                }
            }
        });

        // --- 서버 이벤트 수신 처리 ---
        socket.on('initPlayer', (data) => {
            document.getElementById('my-balance').innerText = data.balance.toLocaleString();
            if (data.currentBet) {
                document.getElementById('my-bet-status').innerText = `${data.currentBet}에 ${data.betAmount}포인트`;
            }
        });

        socket.on('marketUpdate', (data) => {
            // 유가 및 긴장도 화면 업데이트
            document.getElementById('oil-price').innerText = data.oilPrice;
            document.getElementById('tension-meter').innerText = data.tensionLevel;
            
            // 실시간 베팅율 비율 노출
            document.getElementById('pool-yes').innerText = data.bettingPool.YES;
            document.getElementById('pool-no').innerText = data.bettingPool.NO;

            // 실시간 차트 갱신 (최대 20개 노출)
            const now = new Date();
            const timeStr = `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
            
            if (priceData.length > 20) {
                priceData.shift();
                labelData.shift();
            }
            priceData.push(parseFloat(data.oilPrice));
            labelData.push(timeStr);
            chart.update();
        });

        socket.on('newsAlert', (msg) => {
            const newsBox = document.getElementById('news-box');
            const item = document.createElement('div');
            item.className = 'news-item';
            item.innerText = msg;
            newsBox.prepend(item);
        });

        socket.on('errorMsg', (msg) => {
            alert(msg);
        });

        // --- 유저 행동 송신 처리 ---
        function influence(faction) {
            socket.emit('influence', faction);
        }

        function placeBet(type) {
            const amount = parseInt(prompt("베팅할 포인트를 입력하세요:", "1000"));
            if (amount) {
                socket.emit('placeBet', { type, amount });
            }
        }
    </script>
</body>
</html>
